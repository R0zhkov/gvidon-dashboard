<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        padding: 1vh;
      }

      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 1vh;
        flex-shrink: 0;
        height: 6vh;
        min-height: 35px;
      }
      .switch button {
        padding: 0 16px;
        font-size: clamp(12px, 2vh, 18px);
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
        height: 100%;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }

      .main-number {
        font-size: min(40vw, 55vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: none;
        justify-content: center;
        gap: 15px;
        flex-shrink: 0;
        height: auto;
        min-height: 8vh;
        padding-bottom: 1vh;
      }
      .metrics.visible {
        display: flex;
      }

      .metric {
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .metric-value {
        font-size: clamp(24px, 6vh, 48px);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: clamp(10px, 2vh, 14px);
        opacity: 0.75;
        margin-top: 2px;
        white-space: nowrap;
      }

      #mainView {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        cursor: pointer;
      }

      #hourlyView {
        display: none;
        flex: 1;
        width: 100%;
        overflow: hidden;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      /* Стили для таблицы - компактные */
      .hourly-table {
        width: auto;
        border-collapse: collapse;
        table-layout: fixed;
        max-height: 85vh;
      }

      .hourly-row {
        height: auto;
      }

      .hourly-cell {
        padding: 0.8vh 1vw;
        vertical-align: middle;
        line-height: 1.2;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }

      .hourly-cell:first-child {
        font-weight: 700;
        color: rgba(255, 255, 255, 0.95);
        text-align: right;
        padding-right: 2vw;
        width: auto;
        font-size: clamp(14px, 3vh, 20px);
      }

      .hourly-cell:nth-child(2) {
        text-align: center;
        width: auto;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(12px, 2.5vh, 18px);
      }

      .hourly-cell:last-child {
        text-align: left;
        padding-left: 2vw;
        width: auto;
      }

      .company-group {
        display: block;
        line-height: 1.3;
        white-space: nowrap;
        font-size: clamp(10px, 2vh, 16px);
      }

      .company-8plus {
        color: rgba(255, 255, 255, 0.9);
      }

      .company-5to7 {
        color: rgba(255, 255, 255, 0.7);
      }

      .hourly-empty {
        text-align: center;
        opacity: 0.6;
        font-size: clamp(16px, 4vh, 24px);
      }

      /* Очень маленькие экраны */
      @media (max-width: 360px) {
        .switch {
          min-height: 30px;
        }
        .switch button {
          padding: 0 10px;
        }
      }

      /* Горизонтальная ориентация */
      @media (orientation: landscape) and (max-height: 500px) {
        .switch {
          height: 10vh;
          min-height: 30px;
        }
        .main-number {
          font-size: min(35vw, 70vh);
        }
        .hourly-cell {
          padding: 0.5vh 2vw;
        }
      }

      /* Большие экраны */
      @media (min-width: 1200px) {
        .hourly-cell:first-child {
          font-size: clamp(16px, 2.5vh, 24px);
        }
        .hourly-cell:nth-child(2) {
          font-size: clamp(14px, 2vh, 20px);
        }
        .company-group {
          font-size: clamp(12px, 1.8vh, 18px);
        }
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div id="mainView">
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView">
      <div class="table-container" id="tableContainer"></div>
    </div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");
        const tableContainer = document.getElementById("tableContainer");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          let hasContent = false;

          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }

          if (hasContent && currentView === "total") {
            metricsContainer.classList.add("visible");
          } else {
            metricsContainer.classList.remove("visible");
          }
        }

        function showTotalView() {
          mainView.style.display = "flex";
          hourlyView.style.display = "none";
          currentView = "total";
          if (window.currentData) {
            renderMetrics(
              window.currentData.bookings5to7 || 0,
              window.currentData.bookings8plus || 0
            );
          }
        }

        function parseLargeInfo(largeInfo) {
          let companies8plus = "–";
          let companies5to7 = "–";

          if (largeInfo && largeInfo !== "–") {
            const match8plus = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/
            );
            if (match8plus) {
              const count = parseInt(match8plus[1]);
              companies8plus = `${count} комп. (8+)`;
            }

            const match5to7 = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/
            );
            if (match5to7) {
              const count = parseInt(match5to7[1]);
              companies5to7 = `${count} комп. (5–7)`;
            }
          }

          return { companies8plus, companies5to7 };
        }

        function showHourlyView(hourlyData) {
          mainView.style.display = "none";
          hourlyView.style.display = "flex";
          currentView = "hourly";
          metricsContainer.classList.remove("visible");

          if (!hourlyData || hourlyData.length === 0) {
            tableContainer.innerHTML =
              '<div class="hourly-empty">Нет броней</div>';
            return;
          }

          let html = '<table class="hourly-table">';

          for (const h of hourlyData) {
            const time = `${h.hour}:00`;
            const countText = `${h.count} бр.<br>${h.guests}`;
            const { companies8plus, companies5to7 } = parseLargeInfo(
              h.largeInfo
            );

            const largeText = `
              <span class="company-group company-8plus">${companies8plus}</span>
              <span class="company-group company-5to7">${companies5to7}</span>
            `;

            html += `
              <tr class="hourly-row">
                <td class="hourly-cell">${time}</td>
                <td class="hourly-cell">${countText}</td>
                <td class="hourly-cell">${largeText}</td>
              </tr>`;
          }

          html += "</table>";
          tableContainer.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            window.currentData = data;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            window.currentData = null;
            metricsContainer.classList.remove("visible");
            if (currentView === "hourly") {
              tableContainer.innerHTML =
                '<div class="hourly-empty">Ошибка загрузки</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);
      });
    </script>
  </body>
</html>
