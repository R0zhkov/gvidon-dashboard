<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .switch button {
        padding: 6px 12px;
        font-size: 14px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(50vw, 50vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        margin-bottom: 8px;
      }

      /* Метрики — увеличены и чуть приподняты */
      .metrics {
        display: flex;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.3s ease, transform 0.3s ease;
        transform: translateY(-8px);
      }
      .metrics.hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px) scale(0.95);
      }
      .metric {
        text-align: center;
      }
      .metric-value {
        font-size: min(12vw, 12vh); /* +150% относительно 8vw */
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(3.2vw, 3.2vh);
        opacity: 0.75;
        margin-top: 4px;
        white-space: nowrap;
      }

      /* Таблица почасовки */
      #hourlyView {
        display: none;
        overflow-y: auto;
        padding: 0 8px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hourly-row {
        display: flex;
        align-items: center;
        padding: 6px 0;
        font-size: min(4vw, 4vh);
        gap: 10px;
        width: 100%;
        max-width: 400px;
      }

      .time {
        flex: 0 0 60px;
        text-align: right;
        font-weight: 600;
      }

      .main {
        flex: 1;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .large {
        flex: 0 0 110px;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 480px) {
        .metric-value {
          font-size: 18px;
        }
        .metric-label {
          font-size: 13px;
        }
        .hourly-row {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView"></div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
          <div class="metric-value">${bookings5to7}</div>
          <div class="metric-label">5–7 гостей</div>
        `;
            metricsContainer.appendChild(el);
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
          <div class="metric-value">${bookings8plus}</div>
          <div class="metric-label">8+ гостей</div>
        `;
            metricsContainer.appendChild(el);
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          metricsContainer.classList.remove("hidden");
          currentView = "total";
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "flex";
          metricsContainer.classList.add("hidden");
          currentView = "hourly";

          const container = document.getElementById("hourlyView");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML =
              '<div style="text-align:center; opacity:0.6;">Нет броней</div>';
            return;
          }

          let html = "";
          for (const h of hourlyData) {
            // Формат: "3 бр. (12)"
            const bookingShort = `${h.count} бр. (${h.guests})`;

            // Преобразуем:
            // "1 компания (8+)" → "8+: 1"
            // "2 компании (5–7)" → "5–7: 2"
            let largeShort = h.largeInfo;
            if (largeShort !== "–") {
              // Заменяем полные фразы на компактные
              largeShort = largeShort
                .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/g, "8+: $1")
                .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/g, "5–7: $1");
            }

            html += `<div class="hourly-row">
          <span class="time">${h.hour}:00</span>
          <span class="main">${bookingShort}</span>
          <span class="large">${largeShort}</span>
        </div>`;
          }
          container.innerHTML = html;
        }

        // Переключение кликом
        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        // Загрузка данных
        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            window.currentData = data;

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            renderMetrics(0, 0);
            if (currentView === "hourly") {
              document.getElementById("hourlyView").innerHTML =
                '<div style="text-align:center; opacity:0.6;">Ошибка</div>';
            }
          }
        }

        // Обработчики кнопок
        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        // Инициализация
        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);
      });
    </script>
  </body>
</html>
