<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 10px;
      }
      .switch button {
        padding: 10px 20px;
        font-size: 18px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(55vw, 55vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: none;
        justify-content: center;
        gap: 24px;
      }
      .metrics.visible {
        display: flex;
      }

      .metric {
        text-align: center;
      }
      .metric-value {
        font-size: min(15vw, 15vh);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(4vw, 4vh);
        opacity: 0.75;
        margin-top: 4px;
        white-space: nowrap;
      }

      #hourlyView {
        display: none;
        overflow-y: auto;
        padding: 8px;
        flex: 1;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* НОВЫЕ СТИЛИ ДЛЯ ТАБЛИЦЫ */
      .hourly-table {
        width: auto;
        margin: 0 auto;
        border-collapse: collapse;
      }

      .hourly-row {
        display: table-row;
      }

      .hourly-cell {
        display: table-cell;
        padding: 12px 20px;
        vertical-align: middle;
        font-size: min(4.5vw, 30px);
        line-height: 1.2;
        border-bottom: 2px solid rgba(255, 255, 255, 0.15);
      }

      .hourly-cell:first-child {
        font-weight: 700;
        color: rgba(255, 255, 255, 0.95);
        white-space: nowrap;
        text-align: right;
        padding-right: 30px;
        font-size: min(5vw, 32px);
      }

      .hourly-cell:nth-child(2) {
        text-align: center;
        min-width: 180px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
      }

      .hourly-cell:last-child {
        text-align: left;
        padding-left: 30px;
        min-width: 220px;
      }

      .company-group {
        display: block;
        margin: 2px 0;
        font-size: min(4vw, 26px);
        line-height: 1.3;
      }

      .company-8plus {
        color: rgba(255, 255, 255, 0.9);
      }

      .company-5to7 {
        color: rgba(255, 255, 255, 0.8);
      }

      /* Адаптивность для мобильных */
      @media (max-width: 768px) {
        .metric-value {
          font-size: 22px;
        }
        .metric-label {
          font-size: 16px;
        }

        .hourly-cell {
          padding: 10px 12px;
          font-size: 22px;
        }

        .hourly-cell:first-child {
          font-size: 24px;
          padding-right: 20px;
        }

        .hourly-cell:nth-child(2) {
          min-width: 140px;
          font-size: 20px;
        }

        .hourly-cell:last-child {
          padding-left: 20px;
          min-width: 180px;
        }

        .company-group {
          font-size: 18px;
        }
      }

      /* Для десктопов */
      @media (min-width: 769px) {
        .hourly-cell {
          font-size: 28px;
          padding: 14px 25px;
        }

        .hourly-cell:first-child {
          font-size: 32px;
          padding-right: 40px;
        }

        .hourly-cell:nth-child(2) {
          min-width: 220px;
          font-size: 26px;
        }

        .hourly-cell:last-child {
          min-width: 280px;
          padding-left: 40px;
        }

        .company-group {
          font-size: 24px;
        }
      }

      /* Для больших экранов (dashboard на стене) */
      @media (min-width: 1200px) {
        .hourly-cell {
          font-size: 32px;
          padding: 16px 30px;
        }

        .hourly-cell:first-child {
          font-size: 36px;
          padding-right: 50px;
        }

        .hourly-cell:nth-child(2) {
          min-width: 250px;
          font-size: 30px;
        }

        .hourly-cell:last-child {
          min-width: 320px;
          padding-left: 50px;
        }

        .company-group {
          font-size: 28px;
        }

        .switch button {
          font-size: 22px;
          padding: 12px 24px;
        }
      }

      /* Пустая строка */
      .hourly-empty {
        text-align: center;
        padding: 40px 20px;
        opacity: 0.6;
        font-size: min(5vw, 32px);
      }

      /* Для центрирования всей таблицы */
      .table-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        width: 100%;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView">
      <div class="table-container" id="tableContainer"></div>
    </div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");
        const tableContainer = document.getElementById("tableContainer");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          let hasContent = false;

          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }

          if (hasContent && currentView === "total") {
            metricsContainer.classList.add("visible");
          } else {
            metricsContainer.classList.remove("visible");
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          currentView = "total";
          if (window.currentData) {
            renderMetrics(
              window.currentData.bookings5to7 || 0,
              window.currentData.bookings8plus || 0
            );
          }
        }

        function parseLargeInfo(largeInfo) {
          let companies8plus = "–";
          let companies5to7 = "–";

          if (largeInfo && largeInfo !== "–") {
            // Ищем компании 8+
            const match8plus = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/
            );
            if (match8plus) {
              const count = parseInt(match8plus[1]);
              companies8plus = `${count} компания${getCompanyWordEnding(
                count
              )} (8+)`;
            }

            // Ищем компании 5-7
            const match5to7 = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/
            );
            if (match5to7) {
              const count = parseInt(match5to7[1]);
              companies5to7 = `${count} компания${getCompanyWordEnding(
                count
              )} (5–7)`;
            }
          }

          return { companies8plus, companies5to7 };
        }

        function getCompanyWordEnding(count) {
          if (count % 10 === 1 && count % 100 !== 11) return "я";
          if (
            count % 10 >= 2 &&
            count % 10 <= 4 &&
            (count % 100 < 10 || count % 100 >= 20)
          )
            return "ии";
          return "ий";
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "flex";
          currentView = "hourly";
          metricsContainer.classList.remove("visible");

          const container = document.getElementById("tableContainer");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML = '<div class="hourly-empty">Нет броней</div>';
            return;
          }

          const isMobile = window.innerWidth <= 768;
          let html = `<table class="hourly-table">`;

          for (const h of hourlyData) {
            // Форматирование времени
            const time = `${h.hour}:00`;

            // Форматирование количества
            let countText;
            if (isMobile) {
              countText = `${h.count} бр.<br>(${h.guests})`;
            } else {
              const word =
                h.count === 1 ? "бронь" : h.count < 5 ? "брони" : "броней";
              countText = `${h.count} ${word}<br>${h.guests} гостей`;
            }

            // Парсим информацию о больших компаниях
            const { companies8plus, companies5to7 } = parseLargeInfo(
              h.largeInfo
            );

            // Форматирование больших компаний в две строки
            const largeText = `
              <span class="company-group company-8plus">${companies8plus}</span>
              <span class="company-group company-5to7">${companies5to7}</span>
            `;

            html += `
              <tr class="hourly-row">
                <td class="hourly-cell">${time}</td>
                <td class="hourly-cell">${countText}</td>
                <td class="hourly-cell">${largeText}</td>
              </tr>`;
          }

          html += `</table>`;
          container.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            window.currentData = data;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            window.currentData = null;
            metricsContainer.classList.remove("visible");
            if (currentView === "hourly") {
              document.getElementById("tableContainer").innerHTML =
                '<div class="hourly-empty">Ошибка загрузки</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);

        // Обработчик изменения размера окна для адаптивности
        window.addEventListener("resize", () => {
          if (
            currentView === "hourly" &&
            window.currentData &&
            window.currentData.hourly
          ) {
            showHourlyView(window.currentData.hourly);
          }
        });
      });
    </script>
  </body>
</html>
