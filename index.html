<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .switch button {
        padding: 6px 12px;
        font-size: 14px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(50vw, 50vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: flex;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.3s ease;
      }
      .metrics.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .metric {
        text-align: center;
      }
      .metric-value {
        font-size: min(12vw, 12vh);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(3.2vw, 3.2vh);
        opacity: 0.75;
        margin-top: 4px;
        white-space: nowrap;
      }

      #hourlyView {
        display: none;
        overflow-y: auto;
        padding: 0 8px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hourly-row {
        display: flex;
        align-items: center;
        padding: 6px 0;
        font-size: min(4vw, 4vh);
        gap: 8px;
        width: fit-content;
        max-width: 100%;
      }

      .time,
      .main,
      .large {
        white-space: nowrap;
      }

      .time {
        text-align: right;
        font-weight: 600;
      }

      .separator {
        opacity: 0.6;
      }

      @media (max-width: 768px) {
        .metric-value {
          font-size: 18px;
        }
        .metric-label {
          font-size: 13px;
        }
        .hourly-row {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView"></div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");

        let selected = "today";
        let currentView = "total";

        metricsContainer.classList.add("hidden");

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          metricsContainer.classList.remove("hidden");
          currentView = "total";
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "flex";
          metricsContainer.classList.add("hidden");
          currentView = "hourly";

          const container = document.getElementById("hourlyView");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML =
              '<div style="text-align:center; opacity:0.6;">Нет броней</div>';
            return;
          }

          const isMobile = window.innerWidth <= 768;
          let html = "";

          for (const h of hourlyData) {
            // Брони
            let bookingText;
            if (isMobile) {
              bookingText = `${h.count} бр. (${h.guests})`;
            } else {
              const word =
                h.count === 1 ? "бронь" : h.count < 5 ? "брони" : "броней";
              bookingText = `${h.count} ${word} (${h.guests} гостей)`;
            }

            // Крупные группы
            let largeText = h.largeInfo;
            if (isMobile && largeText !== "–") {
              largeText = largeText
                .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/g, "$1 (8+)")
                .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/g, "$1 (5–7)");
            }

            html += `<div class="hourly-row">
              <span class="time">${h.hour}:00</span>
              <span class="separator">•</span>
              <span class="main">${bookingText}</span>
              <span class="separator">•</span>
              <span class="large">${largeText}</span>
            </div>`;
          }
          container.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            window.currentData = data;

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            } else {
              setTimeout(() => {
                metricsContainer.classList.remove("hidden");
              }, 100);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            renderMetrics(0, 0);
            if (currentView === "hourly") {
              document.getElementById("hourlyView").innerHTML =
                '<div style="text-align:center; opacity:0.6;">Ошибка</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);
      });
    </script>
  </body>
</html>
