<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .switch button {
        padding: 6px 12px;
        font-size: 14px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(50vw, 50vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: none;
        justify-content: center;
        gap: 24px;
      }
      .metrics.visible {
        display: flex;
      }

      .metric {
        text-align: center;
      }
      .metric-value {
        font-size: min(12vw, 12vh);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(3.2vw, 3.2vh);
        opacity: 0.75;
        margin-top: 4px;
        white-space: nowrap;
      }

      #hourlyView {
        display: none;
        overflow-y: auto;
        padding: 8px;
        flex: 1;
        width: 100%;
      }

      /* НОВЫЕ СТИЛИ ДЛЯ ТАБЛИЦЫ */
      .hourly-table {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        border-collapse: collapse;
      }

      .hourly-row {
        display: table-row;
      }

      .hourly-cell {
        display: table-cell;
        padding: 8px 12px;
        vertical-align: middle;
        font-size: min(3.8vw, 18px);
        line-height: 1.2;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .hourly-cell:first-child {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
        white-space: nowrap;
        padding-left: 0;
      }

      .hourly-cell:nth-child(2) {
        text-align: center;
        min-width: 120px;
      }

      .hourly-cell:last-child {
        text-align: left;
        padding-right: 0;
      }

      /* Адаптивность для мобильных */
      @media (max-width: 768px) {
        .metric-value {
          font-size: 18px;
        }
        .metric-label {
          font-size: 13px;
        }

        .hourly-table {
          font-size: 14px;
        }

        .hourly-cell {
          padding: 6px 8px;
          font-size: 14px;
        }

        .hourly-cell:nth-child(2) {
          min-width: 100px;
        }

        /* Компактный вид для мобильных */
        .mobile-compact {
          display: none;
        }
      }

      /* Для десктопов */
      @media (min-width: 769px) {
        .hourly-cell {
          font-size: 16px;
          padding: 10px 16px;
        }

        .hourly-cell:nth-child(2) {
          min-width: 150px;
        }

        .hourly-cell:first-child {
          width: 100px;
        }
      }

      /* Пустая строка */
      .hourly-empty {
        text-align: center;
        padding: 40px 20px;
        opacity: 0.6;
        font-size: 16px;
      }

      /* Заголовки колонок */
      .hourly-header {
        display: table-header-group;
        background: rgba(255, 255, 255, 0.05);
      }

      .hourly-header .hourly-cell {
        font-weight: 600;
        font-size: min(3vw, 14px);
        color: rgba(255, 255, 255, 0.7);
        padding: 12px 12px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      }

      .hourly-header .hourly-cell:first-child {
        padding-left: 0;
      }

      .hourly-header .hourly-cell:last-child {
        padding-right: 0;
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView"></div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          let hasContent = false;

          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }

          if (hasContent && currentView === "total") {
            metricsContainer.classList.add("visible");
          } else {
            metricsContainer.classList.remove("visible");
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          currentView = "total";
          if (window.currentData) {
            renderMetrics(
              window.currentData.bookings5to7 || 0,
              window.currentData.bookings8plus || 0
            );
          }
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "block";
          currentView = "hourly";
          metricsContainer.classList.remove("visible");

          const container = document.getElementById("hourlyView");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML = '<div class="hourly-empty">Нет броней</div>';
            return;
          }

          const isMobile = window.innerWidth <= 768;
          let html = `
            <table class="hourly-table">
              <thead class="hourly-header">
                <tr>
                  <td class="hourly-cell">Время</td>
                  <td class="hourly-cell">Количество</td>
                  <td class="hourly-cell">Большие компании</td>
                </tr>
              </thead>
              <tbody>`;

          for (const h of hourlyData) {
            // Форматирование времени
            const time = `${h.hour}:00`;

            // Форматирование количества
            let countText;
            if (isMobile) {
              countText = `${h.count} бр. (${h.guests})`;
            } else {
              const word =
                h.count === 1 ? "бронь" : h.count < 5 ? "брони" : "броней";
              countText = `${h.count} ${word}<br><span style="opacity:0.7">${h.guests} гостей</span>`;
            }

            // Форматирование больших компаний
            let largeText = h.largeInfo;
            if (isMobile) {
              if (largeText !== "–") {
                largeText = largeText
                  .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/g, "$1 (8+)")
                  .replace(/(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/g, "$1 (5–7)");
              }
            } else {
              // Для десктопов можно показывать полный текст
              largeText = largeText.replace(/\(/g, "<br>(");
            }

            html += `
              <tr class="hourly-row">
                <td class="hourly-cell">${time}</td>
                <td class="hourly-cell">${countText}</td>
                <td class="hourly-cell">${largeText}</td>
              </tr>`;
          }

          html += `</tbody></table>`;
          container.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            window.currentData = data;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            window.currentData = null;
            metricsContainer.classList.remove("visible");
            if (currentView === "hourly") {
              document.getElementById("hourlyView").innerHTML =
                '<div class="hourly-empty">Ошибка загрузки</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);

        // Обработчик изменения размера окна для адаптивности
        window.addEventListener("resize", () => {
          if (
            currentView === "hourly" &&
            window.currentData &&
            window.currentData.hourly
          ) {
            showHourlyView(window.currentData.hourly);
          }
        });
      });
    </script>
  </body>
</html>
