<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 8px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 5px;
        flex-shrink: 0;
        height: 45px;
      }
      .switch button {
        padding: 8px 16px;
        font-size: 16px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
        height: 100%;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(45vw, 45vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: none;
        justify-content: center;
        gap: 15px;
        flex-shrink: 0;
        height: 70px;
      }
      .metrics.visible {
        display: flex;
      }

      .metric {
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .metric-value {
        font-size: min(10vw, 10vh);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(2.5vw, 2.5vh);
        opacity: 0.75;
        margin-top: 2px;
        white-space: nowrap;
      }

      #hourlyView {
        display: none;
        flex: 1;
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* НОВЫЕ СТИЛИ ДЛЯ ТАБЛИЦЫ */
      .hourly-table {
        width: auto;
        margin: 0 auto;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .hourly-row {
        display: table-row;
      }

      .hourly-cell {
        display: table-cell;
        padding: 8px 12px;
        vertical-align: middle;
        line-height: 1.1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hourly-cell:first-child {
        font-weight: 700;
        color: rgba(255, 255, 255, 0.95);
        white-space: nowrap;
        text-align: right;
        padding-right: 15px;
        width: 70px;
      }

      .hourly-cell:nth-child(2) {
        text-align: center;
        width: 120px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
      }

      .hourly-cell:last-child {
        text-align: left;
        padding-left: 15px;
        width: 150px;
      }

      .company-group {
        display: block;
        margin: 1px 0;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .company-8plus {
        color: rgba(255, 255, 255, 0.9);
      }

      .company-5to7 {
        color: rgba(255, 255, 255, 0.8);
      }

      /* Адаптивный размер шрифта */
      .hourly-cell {
        font-size: calc(12px + 1vw);
      }

      .hourly-cell:first-child {
        font-size: calc(14px + 1vw);
      }

      .company-group {
        font-size: calc(10px + 0.8vw);
      }

      /* Для очень маленьких экранов */
      @media (max-width: 480px) {
        body {
          padding: 5px;
        }

        .switch {
          height: 40px;
          margin-bottom: 3px;
        }

        .switch button {
          font-size: 14px;
          padding: 6px 12px;
        }

        .hourly-cell {
          padding: 6px 8px;
          font-size: 14px;
        }

        .hourly-cell:first-child {
          width: 60px;
          padding-right: 10px;
          font-size: 15px;
        }

        .hourly-cell:nth-child(2) {
          width: 100px;
          font-size: 13px;
        }

        .hourly-cell:last-child {
          width: 120px;
          padding-left: 10px;
        }

        .company-group {
          font-size: 12px;
        }

        .metrics {
          height: 60px;
          gap: 10px;
        }

        .metric-value {
          font-size: min(9vw, 9vh);
        }

        .metric-label {
          font-size: min(2vw, 2vh);
        }
      }

      /* Для средних экранов */
      @media (min-width: 481px) and (max-width: 768px) {
        .hourly-cell {
          font-size: 16px;
          padding: 7px 10px;
        }

        .hourly-cell:first-child {
          width: 65px;
          font-size: 18px;
          padding-right: 12px;
        }

        .hourly-cell:nth-child(2) {
          width: 110px;
          font-size: 15px;
        }

        .hourly-cell:last-child {
          width: 130px;
          padding-left: 12px;
        }

        .company-group {
          font-size: 14px;
        }

        .metrics {
          height: 65px;
        }
      }

      /* Для больших экранов */
      @media (min-width: 769px) {
        body {
          padding: 10px;
        }

        .switch {
          height: 50px;
          margin-bottom: 8px;
        }

        .switch button {
          font-size: 18px;
          padding: 10px 20px;
        }

        .hourly-cell {
          font-size: 20px;
          padding: 10px 15px;
        }

        .hourly-cell:first-child {
          width: 80px;
          font-size: 22px;
          padding-right: 20px;
        }

        .hourly-cell:nth-child(2) {
          width: 140px;
          font-size: 18px;
        }

        .hourly-cell:last-child {
          width: 180px;
          padding-left: 20px;
        }

        .company-group {
          font-size: 16px;
        }

        .metrics {
          height: 80px;
          gap: 20px;
        }

        .main-number {
          font-size: min(50vw, 50vh);
        }
      }

      /* Для очень больших экранов (dashboard) */
      @media (min-width: 1200px) {
        .hourly-cell {
          font-size: 24px;
          padding: 12px 20px;
        }

        .hourly-cell:first-child {
          width: 90px;
          font-size: 26px;
          padding-right: 25px;
        }

        .hourly-cell:nth-child(2) {
          width: 160px;
          font-size: 22px;
        }

        .hourly-cell:last-child {
          width: 200px;
          padding-left: 25px;
        }

        .company-group {
          font-size: 20px;
        }

        .switch button {
          font-size: 20px;
          padding: 12px 24px;
        }

        .main-number {
          font-size: min(55vw, 55vh);
        }

        .metric-value {
          font-size: min(12vw, 12vh);
        }

        .metric-label {
          font-size: min(3vw, 3vh);
        }
      }

      /* Для вертикальной ориентации (высоких экранов) */
      @media (max-height: 600px) {
        .switch {
          height: 35px;
          margin-bottom: 2px;
        }

        .switch button {
          font-size: 12px;
          padding: 4px 8px;
        }

        .hourly-cell {
          padding: 4px 6px;
          font-size: 12px;
        }

        .hourly-cell:first-child {
          width: 50px;
          font-size: 13px;
          padding-right: 8px;
        }

        .hourly-cell:nth-child(2) {
          width: 90px;
          font-size: 11px;
        }

        .hourly-cell:last-child {
          width: 100px;
          padding-left: 8px;
        }

        .company-group {
          font-size: 10px;
        }

        .metrics {
          height: 50px;
        }

        .main-number {
          font-size: min(40vw, 40vh);
        }
      }

      /* Пустая строка */
      .hourly-empty {
        text-align: center;
        opacity: 0.6;
        font-size: calc(14px + 1vw);
      }

      /* Для центрирования всей таблицы */
      .table-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Ограничение высоты таблицы */
      .hourly-table {
        max-height: calc(100vh - 150px);
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView">
      <div class="table-container" id="tableContainer"></div>
    </div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");
        const tableContainer = document.getElementById("tableContainer");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          let hasContent = false;

          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }

          if (hasContent && currentView === "total") {
            metricsContainer.classList.add("visible");
          } else {
            metricsContainer.classList.remove("visible");
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          currentView = "total";
          if (window.currentData) {
            renderMetrics(
              window.currentData.bookings5to7 || 0,
              window.currentData.bookings8plus || 0
            );
          }
        }

        function parseLargeInfo(largeInfo) {
          let companies8plus = "–";
          let companies5to7 = "–";

          if (largeInfo && largeInfo !== "–") {
            // Ищем компании 8+
            const match8plus = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/
            );
            if (match8plus) {
              const count = parseInt(match8plus[1]);
              companies8plus = `${count} комп. (8+)`;
            }

            // Ищем компании 5-7
            const match5to7 = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/
            );
            if (match5to7) {
              const count = parseInt(match5to7[1]);
              companies5to7 = `${count} комп. (5–7)`;
            }
          }

          return { companies8plus, companies5to7 };
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "flex";
          currentView = "hourly";
          metricsContainer.classList.remove("visible");

          const container = document.getElementById("tableContainer");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML = '<div class="hourly-empty">Нет броней</div>';
            return;
          }

          // Адаптивный размер текста в зависимости от количества строк
          const rowCount = hourlyData.length;
          const isMobile = window.innerWidth <= 768;
          const isPortrait = window.innerHeight > window.innerWidth;

          let html = `<table class="hourly-table" style="font-size: ${
            isPortrait ? "90%" : "100%"
          }">`;

          for (const h of hourlyData) {
            // Форматирование времени
            const time = `${h.hour}:00`;

            // Форматирование количества (компактнее на мобильных)
            let countText;
            if (isMobile || rowCount > 8) {
              countText = `${h.count} бр.<br>${h.guests}`;
            } else {
              const word = h.count === 1 ? "бр." : "бр.";
              countText = `${h.count} ${word}<br>${h.guests}`;
            }

            // Парсим информацию о больших компаниях
            const { companies8plus, companies5to7 } = parseLargeInfo(
              h.largeInfo
            );

            // Форматирование больших компаний в две строки
            const largeText = `
              <span class="company-group company-8plus">${companies8plus}</span>
              <span class="company-group company-5to7">${companies5to7}</span>
            `;

            html += `
              <tr class="hourly-row">
                <td class="hourly-cell">${time}</td>
                <td class="hourly-cell">${countText}</td>
                <td class="hourly-cell">${largeText}</td>
              </tr>`;
          }

          html += `</table>`;
          container.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            window.currentData = data;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            window.currentData = null;
            metricsContainer.classList.remove("visible");
            if (currentView === "hourly") {
              document.getElementById("tableContainer").innerHTML =
                '<div class="hourly-empty">Ошибка загрузки</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);

        // Обработчик изменения размера окна для адаптивности
        window.addEventListener("resize", () => {
          if (
            currentView === "hourly" &&
            window.currentData &&
            window.currentData.hourly
          ) {
            showHourlyView(window.currentData.hourly);
          }
        });
      });
    </script>
  </body>
</html>
