<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>Ожидают</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Open Sans", sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        padding: 12px;
      }
      .switch {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 10px;
        flex-shrink: 0;
      }
      .switch button {
        padding: 10px 20px;
        font-size: 18px;
        background: #333;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
        cursor: pointer;
      }
      .switch button.active {
        background: #555;
        border-color: #999;
      }
      .main-number {
        font-size: min(55vw, 55vh);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }

      .metrics {
        display: none;
        justify-content: center;
        gap: 24px;
        flex-shrink: 0;
      }
      .metrics.visible {
        display: flex;
      }

      .metric {
        text-align: center;
      }
      .metric-value {
        font-size: min(15vw, 15vh);
        font-weight: 700;
        line-height: 1;
      }
      .metric-label {
        font-size: min(4vw, 4vh);
        opacity: 0.75;
        margin-top: 4px;
        white-space: nowrap;
      }

      #hourlyView {
        display: none;
        flex: 1;
        width: 100%;
        overflow: hidden;
        min-height: 0;
      }

      .table-container {
        height: 100%;
        width: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        padding: 8px;
      }

      .hourly-table {
        width: 100%;
        max-width: 1400px;
        border-collapse: collapse;
      }

      .hourly-row {
        display: table-row;
      }

      .hourly-cell {
        display: table-cell;
        padding: 8px 12px;
        vertical-align: middle;
        font-size: clamp(14px, 2.2vw, 20px);
        line-height: 1.3;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .hourly-cell:first-child {
        font-weight: 700;
        color: rgba(255, 255, 255, 0.95);
        white-space: nowrap;
        text-align: left;
        padding-right: 20px;
      }

      .hourly-cell:nth-child(2) {
        text-align: left;
        color: rgba(255, 255, 255, 0.85);
        padding-right: 20px;
      }

      .hourly-cell:last-child {
        text-align: left;
        color: rgba(255, 255, 255, 0.85);
      }

      @media (max-width: 768px) {
        .hourly-cell {
          font-size: 14px;
          padding: 6px 8px;
        }
        .hourly-cell:first-child {
          padding-right: 12px;
        }
        .hourly-cell br {
          display: inline;
        }
      }

      @media (min-width: 769px) and (max-width: 1199px) {
        .hourly-cell br {
          content: " ";
        }
        .hourly-cell br:after {
          content: " ";
        }
      }

      @media (min-width: 1200px) {
        .hourly-cell {
          font-size: 22px;
          padding: 10px 16px;
        }
        .hourly-cell:first-child {
          padding-right: 30px;
        }
        .hourly-cell br {
          content: " ";
        }
        .hourly-cell br:after {
          content: " ";
        }
        .switch button {
          font-size: 22px;
          padding: 12px 24px;
        }
      }

      .hourly-empty {
        text-align: center;
        padding: 40px 20px;
        opacity: 0.6;
        font-size: clamp(20px, 4vw, 28px);
      }
    </style>
  </head>
  <body>
    <div class="switch">
      <button id="today" class="active">Сегодня</button>
      <button id="tomorrow">Завтра</button>
    </div>

    <div
      id="mainView"
      style="
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      "
    >
      <div class="main-number" id="waiting">--</div>
    </div>

    <div id="hourlyView">
      <div class="table-container" id="tableContainer"></div>
    </div>

    <div class="metrics" id="metricsContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const todayBtn = document.getElementById("today");
        const tomorrowBtn = document.getElementById("tomorrow");
        const waitingEl = document.getElementById("waiting");
        const metricsContainer = document.getElementById("metricsContainer");
        const mainView = document.getElementById("mainView");
        const hourlyView = document.getElementById("hourlyView");
        const tableContainer = document.getElementById("tableContainer");

        let selected = "today";
        let currentView = "total";

        function setActive(btnId) {
          todayBtn.classList.toggle("active", btnId === "today");
          tomorrowBtn.classList.toggle("active", btnId === "tomorrow");
        }

        function renderMetrics(bookings5to7, bookings8plus) {
          metricsContainer.innerHTML = "";
          let hasContent = false;

          if (bookings5to7 > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings5to7}</div>
              <div class="metric-label">5–7 гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }
          if (bookings8plus > 0) {
            const el = document.createElement("div");
            el.className = "metric";
            el.innerHTML = `
              <div class="metric-value">${bookings8plus}</div>
              <div class="metric-label">8+ гостей</div>
            `;
            metricsContainer.appendChild(el);
            hasContent = true;
          }

          if (hasContent && currentView === "total") {
            metricsContainer.classList.add("visible");
          } else {
            metricsContainer.classList.remove("visible");
          }
        }

        function showTotalView() {
          document.getElementById("mainView").style.display = "flex";
          document.getElementById("hourlyView").style.display = "none";
          currentView = "total";
          if (window.currentData) {
            renderMetrics(
              window.currentData.bookings5to7 || 0,
              window.currentData.bookings8plus || 0
            );
          }
        }

        function parseLargeInfo(largeInfo) {
          let companies8plus = "";
          let companies5to7 = "";

          if (largeInfo && largeInfo !== "–") {
            const match8plus = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(8\+\)/
            );
            if (match8plus) {
              const count = parseInt(match8plus[1]);
              companies8plus = `${count} компани${getCompanyWordEnding(
                count
              )} (8+)`;
            }

            const match5to7 = largeInfo.match(
              /(\d+)\s+компан(?:ия|ии|ий)\s+\(5–7\)/
            );
            if (match5to7) {
              const count = parseInt(match5to7[1]);
              companies5to7 = `${count} компани${getCompanyWordEnding(
                count
              )} (5–7)`;
            }
          }

          if (companies8plus && companies5to7) {
            return `${companies8plus} <br>${companies5to7}`;
          } else if (companies8plus) {
            return companies8plus;
          } else if (companies5to7) {
            return companies5to7;
          } else {
            return "–";
          }
        }

        function getCompanyWordEnding(count) {
          if (count % 10 === 1 && count % 100 !== 11) return "я";
          if (
            count % 10 >= 2 &&
            count % 10 <= 4 &&
            (count % 100 < 10 || count % 100 >= 20)
          )
            return "ии";
          return "ий";
        }

        function showHourlyView(hourlyData) {
          document.getElementById("mainView").style.display = "none";
          document.getElementById("hourlyView").style.display = "flex";
          currentView = "hourly";
          metricsContainer.classList.remove("visible");

          const container = document.getElementById("tableContainer");
          if (!hourlyData || hourlyData.length === 0) {
            container.innerHTML = '<div class="hourly-empty">Нет броней</div>';
            return;
          }

          let html = '<table class="hourly-table">';

          for (const h of hourlyData) {
            const time = `${h.hour}:00`;
            const word =
              h.count === 1 ? "бронь" : h.count < 5 ? "брони" : "броней";
            const guestWord =
              h.guests === 1 ? "гость" : h.guests < 5 ? "гостя" : "гостей";
            const bookingInfo = `${h.count} ${word} <br>(${h.guests} ${guestWord})`;
            const largeInfo = parseLargeInfo(h.largeInfo);

            html += `
              <tr class="hourly-row">
                <td class="hourly-cell">${time}</td>
                <td class="hourly-cell">${bookingInfo}</td>
                <td class="hourly-cell">${largeInfo}</td>
              </tr>`;
          }

          html += "</table>";
          container.innerHTML = html;
        }

        mainView.addEventListener("click", () => {
          if (window.currentData && window.currentData.hourly) {
            showHourlyView(window.currentData.hourly);
          }
        });

        hourlyView.addEventListener("click", () => {
          showTotalView();
        });

        async function fetchData() {
          try {
            const res = await fetch(`/api/stats?date=${selected}`);
            const data = await res.json();

            waitingEl.textContent = data.waiting || 0;
            window.currentData = data;
            renderMetrics(data.bookings5to7 || 0, data.bookings8plus || 0);

            if (currentView === "hourly") {
              showHourlyView(data.hourly);
            }
          } catch (err) {
            waitingEl.textContent = "—";
            window.currentData = null;
            metricsContainer.classList.remove("visible");
            if (currentView === "hourly") {
              document.getElementById("tableContainer").innerHTML =
                '<div class="hourly-empty">Ошибка загрузки</div>';
            }
          }
        }

        todayBtn.addEventListener("click", () => {
          selected = "today";
          setActive("today");
          fetchData();
        });

        tomorrowBtn.addEventListener("click", () => {
          selected = "tomorrow";
          setActive("tomorrow");
          fetchData();
        });

        setActive("today");
        fetchData();
        setInterval(fetchData, 60000);

        window.addEventListener("resize", () => {
          if (
            currentView === "hourly" &&
            window.currentData &&
            window.currentData.hourly
          ) {
            showHourlyView(window.currentData.hourly);
          }
        });
      });
    </script>
  </body>
</html>
